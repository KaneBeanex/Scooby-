<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scooby Detective Kit Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#a3e635">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Small style for the update notification */
        #update-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #a3e635;
            color: #000;
            padding: 10px 20px;
            border-radius: 50px;
            display: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="update-toast" onclick="location.reload()">New Update Available! Tap to Refresh 🚀</div>

    <div class="app-container">
        <header>
            <h1>🔍 SCOOBY <span class="accent">PRO</span></h1>
            <p>Nonlinear Cryptic Messaging</p>
        </header>

        <div class="input-group">
            <label>Secret Key (5+ Chars)</label>
            <input type="text" id="secretKey" maxlength="15" placeholder="Default: 00000">
        </div>

        <section class="workspace">
            <div class="label-row">
                <label>Input Evidence</label>
                <button id="pasteBtn" class="small-btn">Paste 📋</button>
            </div>
            <textarea id="inputText" placeholder="Enter message or cryptic code..."></textarea>
            
            <div class="controls">
                <button id="encodeBtn" class="btn-primary">ENCODE 🔒</button>
                <button id="decodeBtn" class="btn-secondary">DECODE 🔓</button>
            </div>

            <label>Result</label>
            <textarea id="outputText" readonly></textarea>
        </section>

        <footer>
            <button id="copyBtn">Copy Result 📁</button>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
      let newWorker;

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(reg => {
            reg.addEventListener('updatefound', () => {
              newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // Show the update toast
                  document.getElementById('update-toast').style.display = 'block';
                }
              });
            });
          });
        });

        // Add a listener to refresh the page once the new SW takes control
        let refreshing;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          window.location.reload();
          refreshing = true;
        });
      }

      // This function can be called by the toast button
      function updateApp() {
        if (newWorker) {
          newWorker.postMessage('SKIP_WAITING');
        }
      }

      // Attach the update trigger to the toast
      document.getElementById('update-toast').addEventListener('click', updateApp);
    </script>
</body>
</html>
